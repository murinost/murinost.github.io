<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Муринский переводчик</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap">

<style>
:root {
  --accent: #8b5cf6;
  --text: #ffffff;
  --gray: #e0e0e0;
  --light: rgba(255,255,255,0.2);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Google Sans',Arial,sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  color:var(--text);
  background:#000;
}
header{
  height:64px;
  padding:0 20px;
  display:flex;
  align-items:center;
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.05);
  border-bottom:1px solid var(--light);
}
.logo{font-size:22px;font-weight:600;color:#fff;}
main{
  flex:1;
  padding:20px;
  max-width:960px;
  margin:0 auto;
  width:100%;
}
.translator{
  border-radius:16px;
  overflow:hidden;
  backdrop-filter:blur(25px);
  background:rgba(255,255,255,0.07);
  border:1px solid var(--light);
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
}
.lang-row{
  padding:12px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  font-weight:500;
  color:#fff;
  border-bottom:1px solid var(--light);
}
.swap-btn{
  width:40px;height:40px;border-radius:50%;
  border:1px solid var(--light);
  background:rgba(255,255,255,0.1);
  font-size:20px;color:#fff;cursor:pointer;
}
.area{position:relative;}
textarea,#output{
  width:100%;
  min-height:220px;
  padding:18px 16px;
  font-size:19px;
  line-height:1.48;
  border:none;
  outline:none;
  resize:vertical;
  font-family:inherit;
  background:rgba(255,255,255,0.1);
  color:#fff;
  backdrop-filter:blur(15px);
}
#output{border-top:1px solid var(--light);white-space:pre-wrap;}
.actions{position:absolute;bottom:12px;right:16px;}
.btn{background:none;border:none;font-size:20px;color:#fff;cursor:pointer;}
.camera-btn{
  position:absolute;
  top:12px;
  right:16px;
  background:rgba(255,255,255,0.15);
  border:1px solid var(--light);
  border-radius:50%;
  width:36px;
  height:36px;
  cursor:pointer;
  color:#fff;
  z-index:10;
}
.status-bar{
  padding:10px 16px;font-size:13px;
  background:rgba(255,255,255,0.05);
  border-top:1px solid var(--light);
}
footer{
  padding:16px;text-align:center;font-size:13px;
  border-top:1px solid var(--light);
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.05);
}
footer a{color:#fff;text-decoration:none;}
#photoInput{display:none;}
</style>
</head>
<body>

<header>
  <div class="logo">Муринский переводчик</div>
</header>

<main>
  <div class="translator">
    <div class="lang-row">
      <span id="from">Русский</span>
      <button class="swap-btn" id="swap">↔</button>
      <span id="to">Муринский</span>
    </div>

    <div class="area">
      <button class="camera-btn" id="cameraBtn">📷</button>
      <textarea id="input" placeholder="Введите текст..." autofocus></textarea>
      <div class="actions">
        <button class="btn" id="clear">❌</button>
      </div>
    </div>

    <div id="output">Перевод появится здесь...</div>
    <div class="status-bar">Ожидаю ввода...</div>
  </div>
</main>

<footer>
  TikTok • <a href="https://tiktok.com/@murinstroy" target="_blank">@murinstroy</a>
</footer>

<input type="file" id="photoInput" accept="image/*" multiple>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
const dict = {
  "друг": "друн",
  "друзья": "друны",
  "подруга": "подруня",
  "подруги": "подруны",
  "жена": "жинка",
  "сын": "сыр",
  "батя": "батч",
  "папа": "батч",
  "мама": "матч",
  "дед": "дод",
  "прадед": "прадод",
  "кто": "кто",
  "это": "этность",
  "баня": "банька"
};

const pronouns = ["я","ты","он","она","оно","мы","вы","они","меня","тебя","его","её","нас","вас","их"];

const noTranslate = ["мурино","молочное","мытищи"];
const serviceWords = ["с","со","к","ко","в","во","на","по","за","от","до","из","под","над","о","об","про","при","для","у"];

let forward = true;

const input = document.getElementById("input");
const output = document.getElementById("output");
const swapBtn = document.getElementById("swap");
const fromEl = document.getElementById("from");
const toEl = document.getElementById("to");
const clearBtn = document.getElementById("clear");
const cameraBtn = document.getElementById("cameraBtn");
const photoInput = document.getElementById("photoInput");
const statusBar = document.querySelector(".status-bar");

cameraBtn.onclick = () => photoInput.click();

photoInput.addEventListener("change", async function() {
  const files = Array.from(this.files);
  if (!files.length) return;
  statusBar.textContent = "Распознаю текст...";
  let fullText = "";
  for (let i = 0; i < files.length; i++) {
    const result = await Tesseract.recognize(files[i], 'rus');
    fullText += result.data.text.trim() + " ";
  }
  input.value = fullText.trim();
  statusBar.textContent = "Текст распознан!";
  translate();
});

function preserveCase(original, translated) {
  if(original[0] === original[0].toUpperCase()){
    return translated.charAt(0).toUpperCase() + translated.slice(1);
  }
  return translated;
}

function isNoun(word){
  return !/(ать|ять|ить|еть|ешь|ишь|ют|ут|ет|ем|ите|ый|ий|ая|ое|ые|ие)$/i.test(word);
}

function addEnding(word){
  if(dict[word]) return dict[word];
  if(!isNoun(word)) return word;

  if(word.endsWith("т")) return word + "ность";
  if(word.endsWith("о")){
    const before = word[word.length-2];
    if(["к","п","с","т","ф","х","ц","ч","ш"].includes(before)) return word.slice(0,-1) + "сть";
    return word.slice(0,-1) + "ность";
  }
  if(/[аеёиоуыэюя]$/.test(word)) return word + "сть";
  return word + "ость";
}

function swapLastTwo(word){
  if(word.length<2) return word;
  return word.slice(0,-2)+word.slice(-1)+word.slice(-2,-1);
}

function toMurin(text){
  return text.replace(/[А-Яа-яёЁ]+/g,function(match){
    const lower = match.toLowerCase();
    if(noTranslate.includes(lower) || serviceWords.includes(lower)) return match;

    if(dict[lower]) return preserveCase(match,dict[lower]);

    if(pronouns.includes(lower)) return preserveCase(match,"ч"+lower.slice(1));

    if(isNoun(lower)) return preserveCase(match,addEnding(lower));

    return preserveCase(match,swapLastTwo(lower));
  });
}

function fromMurin(text){
  return text.replace(/[А-Яа-яёЁ]+/g,function(match){
    const lower = match.toLowerCase();
    if(noTranslate.includes(lower) || serviceWords.includes(lower)) return match;

    for(let key in dict){
      if(dict[key]===lower) return preserveCase(match,key);
    }

    if(pronouns.includes(lower)) return preserveCase(match,lower.replace(/^ч/,""));

    return preserveCase(match,swapLastTwo(lower));
  });
}

function translate(){
  const txt=input.value.trim();
  if(!txt){output.textContent="Перевод появится здесь...";return;}
  output.textContent = forward ? toMurin(txt) : fromMurin(txt);
}

swapBtn.onclick = ()=>{
  forward = !forward;
  fromEl.textContent = forward ? "Русский" : "Муринский";
  toEl.textContent = forward ? "Муринский" : "Русский";
  translate();
};

clearBtn.onclick = ()=>{
  input.value="";
  translate();
};

input.addEventListener("input",translate);
translate();
</script>

</body>
<HTML></HTML>
